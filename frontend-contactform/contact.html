<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form - Project 3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        padding: 40px;
      }

      h1 {
        color: #667eea;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
        font-size: 14px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.3s ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      textarea {
        resize: vertical;
        min-height: 120px;
      }

      button {
        width: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 14px;
        display: none;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block;
      }

      .message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block;
      }

      .message.info {
        background-color: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
        display: block;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .tech-stack {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #e0e0e0;
        text-align: center;
        color: #999;
        font-size: 12px;
      }

      .tech-stack strong {
        color: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📧 Contact Us</h1>
      <p class="subtitle">Project 3: Serverless Contact Form</p>

      <form id="contactForm">
        <div class="form-group">
          <label for="name">Name *</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="John Doe"
          />
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="john@example.com"
          />
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea
            id="message"
            name="message"
            required
            placeholder="Your message here..."
          ></textarea>
        </div>

        <button type="submit" id="submitBtn">
          <span id="btnText">Send Message</span>
          <span id="btnSpinner" class="spinner" style="display: none"></span>
        </button>
      </form>

      <div id="responseMessage" class="message"></div>

      <div class="tech-stack">
        <strong>Tech Stack:</strong> AWS Lambda + API Gateway + SES
      </div>
    </div>

    <script>
      const API_ENDPOINT =
        "https://qs9tfa20re.execute-api.us-east-1.amazonaws.com/prod/contact";

      const form = document.getElementById("contactForm");
      const responseDiv = document.getElementById("responseMessage");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const btnSpinner = document.getElementById("btnSpinner");

      let isSubmitting = false;

      function showMessage(type, text) {
        responseDiv.className = "message " + type;
        responseDiv.textContent = text;
        responseDiv.style.display = "block";

        if (type === "success") {
          setTimeout(() => {
            responseDiv.style.display = "none";
          }, 5000);
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (isSubmitting) return;
        isSubmitting = true;

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();

        // Basic frontend validation
        if (name.length > 100) {
          showMessage("error", "Name cannot exceed 100 characters");
          isSubmitting = false;
          return;
        }

        if (message.length > 5000) {
          showMessage("error", "Message cannot exceed 5000 characters");
          isSubmitting = false;
          return;
        }

        const formData = { name, email, message };

        // UI loading state
        submitBtn.disabled = true;
        btnText.textContent = "Sending...";
        btnSpinner.style.display = "inline-block";
        responseDiv.style.display = "none";

        // Request timeout setup
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        try {
          const response = await fetch(API_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
            signal: controller.signal,
          });

          const data = await response.json();

          if (response.ok && data.success) {
            showMessage("success", +data.message);
            form.reset();
          } else {
            showMessage("error", +(data.message || "Request failed"));
          }
        } catch (error) {
          if (error.name === "AbortError") {
            showMessage("error", "Request timeout. Try again.");
          } else {
            showMessage("error", "Network error: " + error.message);
          }
        } finally {
          clearTimeout(timeout);

          submitBtn.disabled = false;
          btnText.textContent = "Send Message";
          btnSpinner.style.display = "none";

          isSubmitting = false;
        }
      });

      window.addEventListener("load", () => {
        showMessage("info", "Contact form ready to use");
      });
    </script>
  </body>
</html>
